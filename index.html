    <!-- Structured data: tells Google this is a SaaS product -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ContractorPro",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "All-in-one business app for contractors: AI estimates, invoices, lead tracking, project notes, marketing copy, and tax-ready expense logs.",
        "url": "https://contractorpro-azure.vercel.app/",
        "image": "https://contractorpro-azure.vercel.app/hammer.svg",
        "offers": {
          "@type": "Offer",
          "price": "29.00",
          "priceCurrency": "USD",
          "priceSpecification": {
            "@type": "UnitPriceSpecification",
            "price": "29.00",
            "priceCurrency": "USD",
            "billingDuration": "P1M",
            "billingIncrement": 1
          }
        }
      }
    </script>
  </head>
  <body>
    <script>
      // Pre-paint theme application — prevents light/dark flash on load.
      (function () {
        try {
          var stored = localStorage.getItem('cp-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var useDark = stored ? stored === 'dark' : prefersDark;
          if (useDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
