<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ContractorPro">
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="55%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
  </defs>

  <!-- Stamped industrial plate -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#plate)"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="#7C2D12" stroke-width="1.5" opacity="0.55"/>
  <rect x="4" y="4" width="56" height="56" rx="10" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.18"/>

  <!-- Corner rivets -->
  <g fill="#0F172A" opacity="0.4">
    <circle cx="8.5" cy="8.5" r="1.2"/>
    <circle cx="55.5" cy="8.5" r="1.2"/>
    <circle cx="8.5" cy="55.5" r="1.2"/>
    <circle cx="55.5" cy="55.5" r="1.2"/>
  </g>

  <!-- Chunky angled hammer -->
  <g transform="rotate(-30 32 32)">
    <!-- Handle -->
    <rect x="29" y="20" width="6" height="32" rx="1.5" fill="#1E293B" stroke="#0F172A" stroke-width="0.8"/>
    <!-- Grip stripes -->
    <rect x="29" y="44" width="6" height="1.5" fill="#F97316" opacity="0.95"/>
    <rect x="29" y="47" width="6" height="1.5" fill="#F97316" opacity="0.95"/>
    <rect x="29" y="50" width="6" height="1.5" fill="#F97316" opacity="0.95"/>
    <!-- Head -->
    <path d="M18 14 H46 L50 18 V26 L46 30 H18 L14 26 V18 Z" fill="url(#head)" stroke="#0F172A" stroke-width="1.2" stroke-linejoin="round"/>
    <line x1="18" y1="22" x2="46" y2="22" stroke="#0F172A" stroke-width="0.8" opacity="0.35"/>
    <!-- Claw -->
    <path d="M14 18 L11 20 L11 24 L14 26 Z" fill="#94A3B8" stroke="#0F172A" stroke-width="1" stroke-linejoin="round"/>
  </g>
</svg>
